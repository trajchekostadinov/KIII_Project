name: CI/CD Pipeline to DockerHub

on:
  push:
    branches: [ "main", "master" ] # Се активира на push во main или master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-architecture support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Билдање и пуштање на Backend Имиџот (сега насочен кон главниот директориум)
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/invoices-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/invoices-backend:${{ github.sha }}

      # 2. Билдање и пуштање на Frontend Имиџот
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/invoices-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/invoices-frontend:${{ github.sha }}