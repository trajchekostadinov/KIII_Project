services:
  db:
    image: postgres:17.4
    restart: always
    container_name: invoices-postgres
    environment:
      POSTGRES_DB: InvoicesDB
      POSTGRES_USER: invoices
      POSTGRES_PASSWORD: invoices
    ports:
    - "5437:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: