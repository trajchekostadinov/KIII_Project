services:
  db:
    image: postgres:17.4
    restart: always
    container_name: invoices-postgres
    environment:
      POSTGRES_DB: InvoicesDB
      POSTGRES_USER: invoices
      POSTGRES_PASSWORD: invoices
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: .
    container_name: invoices-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/InvoicesDB
      SPRING_DATASOURCE_USERNAME: invoices
      SPRING_DATASOURCE_PASSWORD: invoices
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./Frontend
    container_name: invoices-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge