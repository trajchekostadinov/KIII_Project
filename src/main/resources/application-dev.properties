spring.datasource.url=jdbc:postgresql://localhost:5437/InvoicesDB
#spring.datasource.url=jdbc:postgresql://db:5432/
spring.datasource.username=invoices
spring.datasource.password=invoices
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

stripe.api.key=${STRIPE_SECRET_KEY}
spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false

#za frontend ovie porti da bidat
stripe.success.url=http://localhost:5173/payment-success
stripe.cancel.url=http://localhost:5173/payment-cancel

#kaj mene raboti na ovaa porta
server.port=9090